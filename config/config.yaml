# 音频播放配置（从服务器端接收的音频流）
audio_playback:
  sample_rate: 16000  # 采样率（Hz），必须与服务器端TTS输出一致
  # 重要提示：
  # - 如果服务器端使用Qwen3-TTS，其默认输出为24000Hz，此处应设置为24000
  # - 如果服务器端使用其他TTS引擎输出16000Hz，则设置为16000
  # - 采样率不匹配会导致声音变慢/变快或音调异常
  format: "pcm_int16"  # 音频格式（pcm_int16, pcm_float32等，便于未来扩展视频等）
  channels: 1  # 声道数
  prebuffer_ms: 100  # 预缓冲时长（毫秒），用于网络抖动抑制，建议100ms
  output_device_match: "XVF3800"  # 强制音频播放设备匹配名称
  strict_output_device: true  # 找不到 XVF3800 时不回退到默认输出，避免 HDMI 抢占

# LLM Agent 配置（统一WebSocket协议）
llm_agent:
  host: "127.0.0.1:8080"  # LLM Agent服务地址（格式：host:port）
  device_id: "wakefusion-device-01"  # 设备标识
  token: "your-token-here"  # 认证令牌
  use_ssl: false  # 是否使用SSL（true for wss://, false for ws://）
  reconnect_interval_sec: 5.0  # 断线重连间隔（秒）
  ping_interval_sec: 30.0  # 保活ping间隔（秒）
  
  # 火山引擎API配置（如果使用火山引擎LLM Agent，已废弃）
  volcano_api_url: "https://ark.cn-beijing.volces.com/api/v3/responses"  # 火山引擎API地址
  volcano_api_key: "13855083-26c0-423a-9720-f0d02f9e7668"  # 火山引擎API密钥（Bearer Token）
  volcano_model: "doubao-seed-2-0-mini-260215"  # 火山引擎模型名称

# WebSocket配置（已废弃，保留用于向后兼容）
websocket:
  asr_port: 8766  # 已废弃：ASR WebSocket端口
  tts_port: 8767  # 已废弃：TTS WebSocket端口
  core_control_port: 8768  # 已废弃：Core Server控制WebSocket端口

# 环境配置（用于启动脚本）
environments:
  vision: "wakefusion_vision"
  audio: "wakefusion"
  core: "wakefusion"
