# WakeFusion 配置文件

# 音频配置
audio:
  device_match: "default"  # 设备匹配: "XVF3800" 或 "default" (测试用)
  capture_sample_rate: 48000  # 采集采样率
  work_sample_rate: 16000  # 工作采样率
  frame_ms: 20  # 帧长（毫秒）
  ring_buffer_sec: 2.0  # Ring buffer长度（秒）
  pre_roll_ms: 800  # Pre-roll时长（毫秒）
  channels: 1  # 声道数
  rnnoise_enabled: false  # RNNoise降噪开关（需要安装 pyrnnoise）

# KWS配置
kws:
  enabled: true
  engine: "matchboxnet"  # KWS引擎: matchboxnet (推荐) 或 openwakeword
  model: "matchboxnet"
  model_name: "commandrecognition_en_matchboxnet3x1x64_v1"  # 预训练模型名称
  device: "cpu"  # 推理设备: cpu 或 cuda
  keyword: "yes"  # 默认关键词（英文预训练模型）
  threshold: 0.5  # 检测阈值
  cooldown_ms: 1500  # 冷却时长（毫秒），用于硬打断后的OWW屏蔽

# VAD配置（更新为Silero VAD）
vad:
  enabled: true
  engine: "silero"  # VAD引擎：从 "webrtcvad" 改为 "silero"
  model_version: "v4"  # Silero VAD版本
  model_name: "silero_vad"  # 模型名称（16kHz）
  device: "cpu"  # 强制CPU推理，避免占用GPU资源
  threshold: 0.5  # 语音概率阈值（0.0-1.0），默认0.5
  sample_rate: 16000  # 采样率
  # 以下字段保留用于向后兼容（已废弃）
  model: "webrtcvad"  # 已废弃，由engine替代
  speech_start_ms: 120  # 语音起始阈值（毫秒）- 已废弃
  speech_end_ms: 500  # 语音结束阈值（毫秒）- 已废弃

# 视觉配置（Phase 2已启用）
vision:
  enabled: true  # 启用视觉组件
  gate_on_kws_only: true
  cache_ms: 600
  target_fps: 15  # 降低帧率以减少CPU负载
  distance_m_max: 4.0
  face_conf_min: 0.55

# 融合策略配置
fusion:
  probation_enabled: true  # 是否启用降级策略
  probation_ms: 1000  # 降级窗口（毫秒）
  barge_in_enabled: true  # 是否启用打断

# 运行时配置
runtime:
  health_interval_sec: 2  # 健康检查间隔（秒）
  log_level: "INFO"
  websocket_port: 8765  # WebSocket端口
  health_port: 8080  # 健康检查端口
  processing_timeout_sec: 60  # PROCESSING状态最大等待时间（秒）

# ZMQ 通信配置
zmq:
  # 数据流（PUB-SUB，允许丢帧）
  vision_pub_port: 5555
  audio_pub_port: 5556
  
  # 控制流（REQ-REP，必须可靠）
  audio_ctrl_port: 5557
  req_rep_timeout_ms: 2000  # REQ-REP 超时时间（毫秒）
  
  # ASR/TTS模块端口
  asr_pull_port: 5558  # ASR模块PULL端口（Core Server PUSH音频到此端口）
  asr_result_push_port: 5562  # ASR模块PUSH端口（ASR推送识别结果给Core Server）
  tts_text_pull_port: 5563  # TTS模块PULL端口（TTS接收Core Server的合成文本，已废弃）
  tts_push_port: 5559  # TTS模块PUSH端口（Core Server PULL从此端口接收音频，已废弃）
  tts_stop_pub_port: 5560  # TTS停止信号PUB端口（Core Server发布，TTS订阅，已废弃）
  core_control_rep_port: 5561  # Core Server控制端口（REP，接收LLM指令）
  vision_ctrl_pub_port: 5564  # 视觉控制PUB端口（Core Server发布控制消息给Vision Service）

# 视觉唤醒配置
vision_wake:
  detection_distance_m: 4.0  # 4米内开始检测
  frontal_percent_threshold: 70  # 正面率阈值（%）
  distance_range: [0.4, 4.5]  # 有效距离区间（米），用于视觉斩断判断
  enter_debounce_ms: 200  # 进入防抖窗口（毫秒），要求极速响应
  leave_debounce_ms: 1000  # 离开防抖窗口（毫秒），防止误判

# 音频动态阈值配置
audio_threshold:
  default: 0.9  # 默认高阈值（无人时，纯语音唤醒模式）
  visual_wake: 0.6  # 视觉唤醒后的低阈值（视觉降维打击模式）
  change_timeout_ms: 100  # 阈值修改指令超时（毫秒）

# 持续对话配置
conversation:
  vad_silence_timeout_default_sec: 5.0  # 宏观超时（秒）：纯语音唤醒模式下，5秒无语音则结束对话
  vad_silence_timeout_visual_sec: 5.0  # 宏观超时（秒）：视觉降维打击模式下，5秒无语音且无唇动则结束对话
  vad_fast_cutoff_sec: 1.5  # 双模态快刀超时（秒）：连续1.5秒无声音且无唇动则结束对话
  micro_timeout_s: 1.5  # 🌟 微观超时（秒）：用户说完一句话后的截断阈值
  macro_timeout_s: 5.0  # 🌟 宏观超时（秒）：唤醒后发呆/误唤醒的截断阈值
  lip_recent_window_s: 0.8  # 🌟 视觉堆叠端点：最近唇动窗口（秒），用于判断视觉唤醒下的真实开口
  min_sentence_duration_s: 0.5  # 🌟 最短有效句子时长（秒），防止把极短杂音当成一句话
  long_sentence_timeout_s: 30.0  # 🌟 长句保底超时（秒）
  vad_check_interval_ms: 200  # VAD检查间隔（毫秒）
  interactive_timeout_sec: 90.0  # 交互超时（秒）：90秒无交互则退出交互模式
  vad_rms_threshold: 0.003  # VAD RMS阈值（已废弃，由Silero VAD替代）
    # 注意：这是简单的RMS能量阈值，已废弃
    # 如果Silero VAD未启用，将使用此值作为降级方案
    # 如果环境噪音较大，可以适当提高此值（如0.005-0.01）
    # 如果环境很安静，可以降低此值（如0.001-0.002）

