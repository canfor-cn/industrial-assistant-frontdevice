# WakeFusion 配置文件 - Sherpa-ONNX 中文唤醒词版本

# 音频配置
audio:
  device_match: "default"  # 使用系统默认麦克风
  capture_sample_rate: 16000  # Sherpa-ONNX要求16kHz
  work_sample_rate: 16000
  frame_ms: 20
  ring_buffer_sec: 2.0
  pre_roll_ms: 800
  channels: 1

# KWS配置 - Sherpa-ONNX
kws:
  enabled: true
  model: "sherpa"  # 使用Sherpa-ONNX
  model_dir: "./models/sherpa-onnx-kws-zh-16kHz"  # 模型目录
  keywords:
    - "小康小康"
    - "你好小助手"
  threshold: 0.5
  num_threads: 4
  cooldown_ms: 1200

  # 备选方案：Porcupine
  # model: "porcupine"
  # keyword: "xiaokang_xiaokang"
  # keyword_paths: []
  # sensitivities: [0.5]
  # access_key: ""

  # 备选方案：openWakeWord（需要训练）
  # model: "openwakeword"
  # keyword: "xiaokang_xiaokang"
  # model_path: "./models/xiaokang_xiaokang.tflite"
  # threshold: 0.5

# VAD配置
vad:
  enabled: true
  model: "webrtcvad"
  speech_start_ms: 120
  speech_end_ms: 500

# 视觉配置（硬件未到，禁用）
vision:
  enabled: false
  gate_on_kws_only: true
  cache_ms: 600
  target_fps: 15
  distance_m_max: 4.0
  face_conf_min: 0.55

# 融合策略配置
fusion:
  probation_enabled: true
  probation_ms: 1000
  barge_in_enabled: true

# 运行时配置
runtime:
  health_interval_sec: 2
  log_level: "INFO"
  websocket_port: 8765
  health_port: 8080
